<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- Windows brand blue background card with a slightly darker Fluent border -->
  <rect x="1" y="1" width="198" height="58" rx="10" ry="10" fill="#0078d4" stroke="#0063b1" stroke-width="1.5" />
  
  <!-- Modern flat Windows 11 logo in white -->
  <g id="windows-logo" transform="translate(4, 1)">
    <!-- Top-left quadrant -->
    <rect x="18" y="17" width="9" height="9" fill="#ffffff" />
    <!-- Top-right quadrant -->
    <rect x="28.5" y="17" width="9" height="9" fill="#ffffff" />
    <!-- Bottom-left quadrant -->
    <rect x="18" y="27.5" width="9" height="9" fill="#ffffff" />
    <!-- Bottom-right quadrant -->
    <rect x="28.5" y="27.5" width="9" height="9" fill="#ffffff" />
  </g>
  
  <!-- Premium typography aligned exactly like the reference -->
  <text x="54" y="23" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="9.5" fill="#ffffff" font-weight="500" letter-spacing="0.2">Download app for</text>
  <text x="54" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="18.5" fill="#ffffff" font-weight="700" letter-spacing="-0.3">Windows</text>
</svg>
