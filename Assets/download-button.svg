<svg xmlns="http://www.w3.org/2000/svg" width="200" height="72" viewBox="0 0 200 72">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="winGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#228be6"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="1" y="1" width="198" height="70" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="198" height="70" rx="12" fill="none" stroke="#2e2e50" stroke-width="1"/>

  <!-- Windows logo: 4 panes, centered vertically -->
  <rect x="18" y="17" width="15" height="15" rx="2" fill="url(#winGrad)"/>
  <rect x="36" y="17" width="15" height="15" rx="2" fill="url(#winGrad)"/>
  <rect x="18" y="35" width="15" height="15" rx="2" fill="url(#winGrad)"/>
  <rect x="36" y="35" width="15" height="15" rx="2" fill="url(#winGrad)"/>

  <!-- Label -->
  <text x="65" y="31" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#7a8fbb" letter-spacing="0.4">Download app for</text>

  <!-- Wordmark -->
  <text x="65" y="54" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" fill="#e8f0ff" letter-spacing="-0.3">Windows</text>
</svg>
